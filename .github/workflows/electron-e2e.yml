name: Electron E2E

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  electron-e2e:
    name: Electron E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      CI: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Prefer HTTPS for public GitHub git dependencies
        run: |
          git config --global "url.https://github.com/.insteadOf" "git@github.com:"
          git config --global --add "url.https://github.com/.insteadOf" "ssh://git@github.com/"

      - name: Install dependencies
        shell: bash
        run: |
          echo "side-effects-cache=false" >> .npmrc
          pnpm install --frozen-lockfile

      - name: Install Electron binary
        shell: bash
        env:
          force_no_cache: 'true'
        run: |
          set -e
          unset ELECTRON_SKIP_BINARY_DOWNLOAD
          ELECTRON_DIR="$(node -p "require('path').dirname(require.resolve('electron/package.json'))")"
          echo "Electron package dir: $ELECTRON_DIR"
          rm -rf "$ELECTRON_DIR/dist" "$ELECTRON_DIR/path.txt"

          # install.js uses a fire-and-forget promise chain that can let the Node
          # process exit before extract-zip finishes (observed on CI: dist left
          # half-extracted, path.txt never written, exit code still 0). Run an
          # explicit, fully-awaited download + extract instead.
          cat > "$ELECTRON_DIR/clawx-install-electron.cjs" <<'EOF'
          const { downloadArtifact } = require('@electron/get');
          const extract = require('extract-zip');
          const fs = require('fs');
          const path = require('path');
          const { version } = require('./package.json');
          const platformPath = process.platform === 'win32'
            ? 'electron.exe'
            : process.platform === 'darwin'
              ? 'Electron.app/Contents/MacOS/Electron'
              : 'electron';
          (async () => {
            const zipPath = await downloadArtifact({ version, artifactName: 'electron', force: true });
            console.log('Downloaded zip:', zipPath, fs.statSync(zipPath).size, 'bytes');
            const distPath = path.join(__dirname, 'dist');
            fs.rmSync(distPath, { recursive: true, force: true });
            await extract(zipPath, { dir: distPath });
            console.log('Extracted entries in dist:', fs.readdirSync(distPath).length);
            const srcTypeDef = path.join(distPath, 'electron.d.ts');
            if (fs.existsSync(srcTypeDef)) {
              fs.renameSync(srcTypeDef, path.join(__dirname, 'electron.d.ts'));
            }
            fs.writeFileSync(path.join(__dirname, 'path.txt'), platformPath);
            console.log('Wrote path.txt:', platformPath);
          })().catch((err) => {
            console.error('Electron install failed:', err);
            process.exit(1);
          });
          EOF

          ( cd "$ELECTRON_DIR" && node clawx-install-electron.cjs )
          rm -f "$ELECTRON_DIR/clawx-install-electron.cjs"

          if [ ! -f "$ELECTRON_DIR/path.txt" ]; then
            echo "::error::Electron binary failed to install (path.txt missing after install)"
            ls -laR "$ELECTRON_DIR/dist" 2>/dev/null || true
            exit 1
          fi
          echo "path.txt present: $(cat "$ELECTRON_DIR/path.txt")"

      - name: Verify Electron binary
        run: pnpm exec electron --version

      - name: Generate extension bridge
        run: pnpm run ext:bridge

      - name: Run Electron E2E on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm run test:e2e

      - name: Run Electron E2E on macOS
        if: runner.os == 'macOS'
        run: pnpm run test:e2e

      - name: Run Electron E2E on Windows
        if: runner.os == 'Windows'
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 7
