name: Electron E2E

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  electron-e2e:
    name: Electron E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      CI: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Prefer HTTPS for public GitHub git dependencies
        run: |
          git config --global "url.https://github.com/.insteadOf" "git@github.com:"
          git config --global --add "url.https://github.com/.insteadOf" "ssh://git@github.com/"

      - name: Install dependencies
        shell: bash
        run: |
          echo "side-effects-cache=false" >> .npmrc
          pnpm install --frozen-lockfile

      - name: Install Electron binary
        shell: bash
        env:
          force_no_cache: 'true'
        run: |
          set -e
          unset ELECTRON_SKIP_BINARY_DOWNLOAD
          ELECTRON_DIR="$(node -p "require('path').dirname(require.resolve('electron/package.json'))")"
          echo "Electron package dir: $ELECTRON_DIR"
          echo "ELECTRON_SKIP_BINARY_DOWNLOAD=[${ELECTRON_SKIP_BINARY_DOWNLOAD:-<unset>}]"
          echo "npm_config_platform=[${npm_config_platform:-<unset>}] npm_config_arch=[${npm_config_arch:-<unset>}]"

          for attempt in 1 2 3; do
            echo "===== Electron binary download attempt $attempt ====="
            rm -rf "$ELECTRON_DIR/dist" "$ELECTRON_DIR/path.txt"
            set +e
            node "$ELECTRON_DIR/install.js"
            code=$?
            set -e
            echo "install.js exit code: $code"
            echo "--- dist contents after attempt $attempt ---"
            ls -la "$ELECTRON_DIR/dist" 2>/dev/null || echo "(no dist dir)"
            if [ -f "$ELECTRON_DIR/path.txt" ]; then
              echo "path.txt present: $(cat "$ELECTRON_DIR/path.txt")"
              break
            fi
            echo "Attempt $attempt did not produce path.txt; retrying in 10s"
            sleep 10
          done

          if [ ! -f "$ELECTRON_DIR/path.txt" ]; then
            echo "::error::Electron binary failed to install (path.txt missing after install)"
            ls -laR "$ELECTRON_DIR/dist" 2>/dev/null || true
            exit 1
          fi

      - name: Verify Electron binary
        run: pnpm exec electron --version

      - name: Generate extension bridge
        run: pnpm run ext:bridge

      - name: Run Electron E2E on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm run test:e2e

      - name: Run Electron E2E on macOS
        if: runner.os == 'macOS'
        run: pnpm run test:e2e

      - name: Run Electron E2E on Windows
        if: runner.os == 'Windows'
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.os }}
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 7
